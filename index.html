<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio | Cyber Security</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mono: ['"JetBrains Mono"', 'monospace'],
            orbitron: ['Orbitron', 'sans-serif'],
          },
          colors: {
            'neon-green': '#00ff41',
            'neon-blue': '#00d4ff',
            'neon-pink': '#ff00ff',
            'dark-bg': '#0a0a0f',
            'card-bg': '#12121a',
          },
          animation: {
            flicker: 'flicker 3s infinite',
            rotate: 'rotate 4s linear infinite',
            blink: 'blink 1s infinite',
          },
          keyframes: {
            flicker: {
              '0%, 100%': { opacity: '1' },
              '92%': { opacity: '1' },
              '93%': { opacity: '0.8' },
              '94%': { opacity: '1' },
              '95%': { opacity: '0.9' },
              '96%': { opacity: '1' },
            },
            rotate: {
              from: { transform: 'rotate(0deg)' },
              to: { transform: 'rotate(360deg)' },
            },
            blink: {
              '0%, 50%': { opacity: '1' },
              '51%, 100%': { opacity: '0' },
            },
          },
        },
      },
    }
  </script>
  <style>
    body { font-family: 'JetBrains Mono', monospace; }

    .grid-bg {
      background-image:
        linear-gradient(rgba(0,255,65,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,65,.03) 1px, transparent 1px);
      background-size: 50px 50px;
    }

    .scanlines {
      background: repeating-linear-gradient(
        0deg,
        rgba(0,0,0,.03),
        rgba(0,0,0,.03) 1px,
        transparent 1px,
        transparent 2px
      );
    }

    .profile-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #00ff41, #00d4ff, #ff00ff);
    }

    .social-link::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.05), transparent);
      transition: left .5s ease;
    }
    .social-link:hover::before { left: 100%; }

    .avatar-ring::before {
      content: '';
      position: absolute;
      top: -2px; left: 50%;
      width: 10px; height: 10px;
      background: #ff00ff;
      border-radius: 50%;
      box-shadow: 0 0 10px #ff00ff;
    }
  </style>
</head>
<body class="bg-dark-bg text-gray-200 min-h-screen overflow-x-hidden">

  <!-- Grid background -->
  <div class="grid-bg fixed inset-0 pointer-events-none z-0"></div>
  <!-- Scanlines -->
  <div class="scanlines fixed inset-0 pointer-events-none z-[999]"></div>

  <div class="relative z-10 max-w-5xl mx-auto px-5 py-10">

    <!-- Header -->
    <header class="text-center mb-16">
      <h1 id="title" class="font-orbitron font-bold text-neon-green tracking-widest animate-flicker"
          style="font-size: clamp(2rem,8vw,4rem); text-shadow: 0 0 10px #00ff41, 0 0 20px #00ff41">
        CYBER PORTFOLIO<span class="inline-block w-3 h-6 bg-neon-green ml-1 animate-blink align-middle"></span>
      </h1>
      <p class="text-neon-blue mt-3 tracking-[6px] uppercase text-sm">Digital Presence</p>
    </header>

    <!-- Profile -->
    <section class="flex flex-col items-center mb-16">
      <div class="profile-card relative bg-gradient-to-br from-card-bg to-[#1a1a2e] border border-neon-green/20 rounded-2xl p-10 w-full max-w-md text-center overflow-hidden">
        <div class="relative w-36 h-36 mx-auto mb-6">
          <div class="avatar-ring absolute -inset-1 border-2 border-neon-blue rounded-full animate-rotate"></div>
          <img
            src="https://i.pinimg.com/736x/84/d1/68/84d1682bb7f3dbb22d1b5bb3c51f4e85.jpg"
            alt="Profile Avatar"
            class="w-36 h-36 rounded-full object-cover border-[3px] border-neon-green"
            style="box-shadow: 0 0 30px rgba(0,255,65,.3)"
          />
        </div>
        <h2 class="font-orbitron text-2xl text-neon-green mb-2">Yorn Pheaktra</h2>
        <p class="text-neon-blue text-sm tracking-widest mb-4">Cyber Security Student</p>
        <p class="text-gray-500 text-sm leading-relaxed">Geek everyday.</p>
      </div>
    </section>

    <!-- Skills -->
    <section class="mb-16">
      <h3 class="font-orbitron text-neon-blue text-xl text-center uppercase tracking-[3px] mb-8">Expertise</h3>
      <div id="skills-grid" class="flex flex-wrap justify-center gap-4 max-w-2xl mx-auto"></div>
    </section>

    <!-- Social Links -->
    <section class="mb-16">
      <h3 class="font-orbitron text-neon-blue text-xl text-center uppercase tracking-[3px] mb-8">Connect With Me</h3>
      <div id="social-grid" class="grid gap-5 max-w-3xl mx-auto" style="grid-template-columns: repeat(auto-fit, minmax(250px,1fr))"></div>
    </section>

    <!-- Footer -->
    <footer class="text-center pt-8 border-t border-white/10">
      <p class="text-gray-500 text-sm">&lt;/&gt; with <span class="text-neon-green">♥</span> | Cyber Portfolio 2026</p>
    </footer>

  </div>

  <script>
    const socialLinks = [
      { name: 'GitHub',    handle: '@PheakTra000',      url: 'https://github.com/PheakTra000/',                                       icon: 'fa-github',    type: 'github'    },
      { name: 'Instagram', handle: '@yornpheaktra99',   url: 'https://www.instagram.com/yornpheaktra99',                              icon: 'fa-instagram', type: 'instagram' },
      { name: 'TikTok',    handle: '@pheaktrayorn3',    url: 'https://www.tiktok.com/@pheaktrayorn3?_r=1&_t=ZS-95fJ6lA9LYC',         icon: 'fa-tiktok',    type: 'tiktok'    },
      { name: 'Facebook',  handle: '@pheaktra.yorn.14', url: 'https://web.facebook.com/pheaktra.yorn.14',                             icon: 'fa-facebook-f',type: 'facebook'  },
    ];

    const skills = ['None'];

    const socialStyles = {
      github:    { icon: 'bg-[rgba(0,255,65,.1)] text-[#00ff41]',  hover: 'hover:border-[#00ff41] hover:shadow-[0_0_30px_rgba(0,255,65,.2)]'    },
      instagram: { icon: 'bg-[rgba(228,64,95,.1)] text-[#e4405f]', hover: 'hover:border-[#e4405f] hover:shadow-[0_0_30px_rgba(228,64,95,.2)]'  },
      tiktok:    { icon: 'bg-[rgba(0,242,234,.1)] text-[#00f2ea]', hover: 'hover:border-[#00f2ea] hover:shadow-[0_0_30px_rgba(0,242,234,.2)]'  },
      facebook:  { icon: 'bg-[rgba(24,119,242,.1)] text-[#1877f2]',hover: 'hover:border-[#1877f2] hover:shadow-[0_0_30px_rgba(24,119,242,.2)]' },
    };

    // Render skills
    const skillsGrid = document.getElementById('skills-grid');
    skills.forEach(skill => {
      const span = document.createElement('span');
      span.className = 'px-5 py-2.5 bg-card-bg border border-neon-blue/30 rounded-full text-neon-blue text-sm transition-all duration-300 hover:bg-neon-blue/10 hover:border-neon-blue cursor-default';
      span.style.boxShadow = '';
      span.addEventListener('mouseenter', () => span.style.boxShadow = '0 0 20px rgba(0,212,255,.2)');
      span.addEventListener('mouseleave', () => span.style.boxShadow = '');
      span.textContent = skill;
      skillsGrid.appendChild(span);
    });

    // Render social links
    const socialGrid = document.getElementById('social-grid');
    socialLinks.forEach(link => {
      const s = socialStyles[link.type];
      const a = document.createElement('a');
      a.href = link.url;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.className = `social-link flex items-center gap-4 px-6 py-5 bg-card-bg border border-white/10 rounded-xl no-underline text-gray-200 transition-all duration-300 relative overflow-hidden hover:-translate-y-1 ${s.hover}`;
      a.innerHTML = `
        <div class="w-12 h-12 flex items-center justify-center rounded-xl text-2xl ${s.icon}">
          <i class="fab ${link.icon}"></i>
        </div>
        <div class="flex-1">
          <div class="font-semibold text-lg">${link.name}</div>
          <div class="text-gray-500 text-sm">${link.handle}</div>
        </div>
        <i class="fas fa-arrow-right text-gray-500 transition-all duration-300 arrow-icon"></i>
      `;
      a.addEventListener('mouseenter', () => {
        a.querySelector('.arrow-icon').style.transform = 'translateX(5px)';
        a.querySelector('.arrow-icon').style.color = '#00ff41';
      });
      a.addEventListener('mouseleave', () => {
        a.querySelector('.arrow-icon').style.transform = '';
        a.querySelector('.arrow-icon').style.color = '';
      });
      socialGrid.appendChild(a);
    });
  </script>
</body>
</html>
